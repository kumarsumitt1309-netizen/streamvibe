<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch – StreamVibe</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/player.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme" id="app-body">

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-brand" onclick="window.location.href='home.html'" style="cursor:pointer">
      <span class="brand-icon">▶</span>
      <span class="brand-name">StreamVibe</span>
    </div>
    <div class="nav-links">
      <a href="home.html"    class="nav-link">← Back to Home</a>
    </div>
    <div class="nav-user">
      <span class="user-badge" id="user-plan-badge">FREE</span>
      <button class="btn btn-ghost btn-sm" onclick="handleLogout()">Logout</button>
    </div>
  </nav>

  <!-- MAIN LAYOUT -->
  <div class="player-layout">

    <!-- ===== LEFT: VIDEO + CONTROLS ===== -->
    <div class="player-left">

      <!-- VIDEO WRAPPER (gesture zone) -->
      <div class="video-wrapper" id="video-wrapper">

        <!-- Actual video element -->
        <video id="main-video" preload="metadata">
          <!-- Using a free sample video for demo -->
          <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4"/>
          Your browser does not support HTML5 video.
        </video>

        <!-- Gesture zones (invisible overlays) -->
        <div class="gesture-zone zone-left"   id="zone-left"   onclick="handleZoneClick('left')"   ondblclick="handleZoneDblClick('left')"></div>
        <div class="gesture-zone zone-center" id="zone-center" onclick="handleZoneClick('center')" ondblclick="handleZoneDblClick('center')"></div>
        <div class="gesture-zone zone-right"  id="zone-right"  onclick="handleZoneClick('right')"  ondblclick="handleZoneDblClick('right')"></div>

        <!-- Gesture feedback animations -->
        <div class="gesture-feedback" id="gf-left">   <span>⏪ -10s</span></div>
        <div class="gesture-feedback" id="gf-center"> <span id="gf-center-icon">⏸</span></div>
        <div class="gesture-feedback" id="gf-right">  <span>⏩ +10s</span></div>

        <!-- Watch limit overlay -->
        <div class="limit-overlay hidden" id="limit-overlay">
          <div class="limit-card">
            <p class="limit-icon">⏱</p>
            <h2 class="limit-title">Watch Time Reached</h2>
            <p class="limit-msg" id="limit-msg">Your free plan allows 5 minutes of watch time.</p>
            <a href="plans.html" class="btn btn-primary">Upgrade Plan →</a>
            <button class="btn btn-ghost" onclick="closeLimitOverlay()">Keep Watching (Preview)</button>
          </div>
        </div>

        <!-- Custom video controls bar -->
        <div class="video-controls" id="video-controls">

          <!-- Progress bar -->
          <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
              <div class="progress-thumb" id="progress-thumb"></div>
              <!-- Watch limit marker -->
              <div class="limit-marker" id="limit-marker"></div>
            </div>
          </div>

          <div class="controls-row">
            <!-- Left controls -->
            <div class="controls-left">
              <button class="ctrl-btn" id="play-pause-btn" onclick="togglePlayPause()">▶</button>
              <button class="ctrl-btn" onclick="skipVideo(-10)" title="Back 10s">⏪</button>
              <button class="ctrl-btn" onclick="skipVideo(10)"  title="Forward 10s">⏩</button>
              <div class="volume-group">
                <button class="ctrl-btn" onclick="toggleMute()" id="mute-btn">🔊</button>
                <input type="range" class="volume-slider" id="volume-slider"
                  min="0" max="1" step="0.05" value="1"
                  oninput="setVolume(this.value)"/>
              </div>
              <span class="time-display" id="time-display">0:00 / 0:00</span>
            </div>

            <!-- Right controls -->
            <div class="controls-right">
              <button class="ctrl-btn" onclick="toggleComments()" title="Comments">💬</button>
              <button class="ctrl-btn" onclick="skipToNext()"     title="Next video">⏭</button>
              <button class="ctrl-btn" onclick="toggleFullscreen()" title="Fullscreen" id="fs-btn">⛶</button>
            </div>
          </div>

        </div>

        <!-- Gesture hint (shown briefly on first load) -->
        <div class="gesture-hint" id="gesture-hint">
          <div class="hint-grid">
            <div class="hint-cell">← Double tap<br/><small>-10 seconds</small></div>
            <div class="hint-cell">Single tap<br/><small>Pause / Play</small></div>
            <div class="hint-cell">Double tap →<br/><small>+10 seconds</small></div>
          </div>
        </div>

      </div><!-- end video-wrapper -->

      <!-- VIDEO INFO -->
      <div class="video-info">
        <h1 class="video-title" id="video-title">Loading...</h1>
        <div class="video-meta-row">
          <div class="video-meta-left">
            <span class="channel-badge">📺</span>
            <span class="channel-name" id="channel-name">Channel</span>
            <span class="view-count"   id="view-count">0 views</span>
          </div>
          <div class="video-meta-right">
            <button class="action-pill" onclick="handleDownload()">⬇ Download</button>
            <button class="action-pill" onclick="toggleComments()">💬 Comments</button>
            <button class="action-pill active" id="watch-timer-pill">⏱ 0:00</button>
          </div>
        </div>
      </div>

    </div><!-- end player-left -->

    <!-- ===== RIGHT: COMMENT SECTION (Point 1 — UI ready, logic in Phase 3) ===== -->
    <div class="comments-panel" id="comments-panel">
      <div class="comments-header">
        <h3 class="comments-title">💬 Comments</h3>
        <button class="close-comments" onclick="toggleComments()">✕</button>
      </div>

      <!-- Comment input -->
      <div class="comment-input-area">
        <textarea
          id="comment-input"
          class="comment-textarea"
          placeholder="Write a comment... (any language)"
          maxlength="500"
          rows="3"
        ></textarea>
        <div class="comment-input-actions">
          <select class="translate-select" id="translate-lang">
            <option value="">Translate to...</option>
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="ta">Tamil</option>
            <option value="te">Telugu</option>
            <option value="kn">Kannada</option>
            <option value="ml">Malayalam</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="zh">Chinese</option>
            <option value="ar">Arabic</option>
            <option value="ja">Japanese</option>
          </select>
          <button class="btn btn-primary btn-sm" onclick="postComment()">Post</button>
        </div>
      </div>

      <!-- Comments list -->
      <div class="comments-list" id="comments-list">
        <p class="comments-loading">Loading comments...</p>
      </div>
    </div>

  </div><!-- end player-layout -->

  <!-- TOAST -->
  <div class="toast hidden" id="toast"><span id="toast-msg"></span></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/ui-helpers.js"></script>
  <script src="../js/player.js"></script>
</body>
</html>
